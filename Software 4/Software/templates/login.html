<!DOCTYPE html>
<html lang="pt-br">
 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
 
    <link rel="stylesheet" href="{{ url_for('static', filename='login.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
 
<body>
 
    {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
    <div class="alert-container">
        {% for categoria, mensagem in messages %}
        <div class="alert alert-{{ 'success' if categoria == 'sucesso' else 'danger' }}">
            {{ mensagem }}
        </div>
        {% endfor %}
    </div>
    {% endif %}
    {% endwith %}
 
    <div class="container d-flex align-items-center justify-content-center login-container">
        <div class="login-card text-start">
 
            <div class="card-cad text-start mb-4">
                <img src="{{ url_for('static', filename='imagem/logo.png') }}" alt="HypeX" class="logo">
 
                <h4 class="mb-3 text-white">Seja Bem Vindo!</h4>
                <p class="mb-4 text-white">Acesse sua conta</p>
                <div class="mt-4 text-white" style="font-size: 13px">
                    © 2025 HYPE X - Sistema de Estoque.
                </div>
            </div>
 
            <form method="POST">
 
                <div class="forms mb-3 text-start">
                    <h2>LOGIN</h2>
 
                    <label class="form-label text-gray">Email</label>
                    <div class="input-group w-50">
                        <span class="input-group-text bg-dark border-secondary">
                            <i class="bi bi-envelope text-white"></i>
                        </span>
                        <input type="email" class="form-control" name="email" placeholder="Digite seu email" required>
                    </div>
 
                    <div class="mb-5 text-start">
                        <label class="form-label text-gray">Senha</label>
                        <div class="input-group w-50">
                            <span class="input-group-text bg-dark border-secondary">
                                <i class="bi bi-lock text-white"></i>
                            </span>
                            <input type="password" class="form-control" name="senha" placeholder="Digite sua senha"
                                required>
                        </div>
                    </div>
 
                    <button class="btn-login btn-primary w-50 text-white mt-0" type="submit">
                        Entrar
                    </button>
 
                    <div class="login-links">
                        <div class="text-gray link-senha">
                            <a href="#" class="esqueci-senha">Esqueci Minha Senha</a>
                        </div>
                    </div>
 
                    <label class="manter-logado">
                        <input type="checkbox" name="lembrar">
                        Manter logado
                    </label>
                </div>
 
            </form>
 
            <div class="grid-login">
                <a href="#" class="bi bi-google text-gray"></a>
                <a href="#" class="bi bi-linkedin text-gray"></a>
                <a href="#" class="bi bi-apple text-gray"></a>
                <a href="#" class="bi bi-facebook text-gray"></a>
            </div>
        </div>
 
    </div>
    </div>
 
    <script>
        setTimeout(() => {
            const alerts = document.querySelectorAll('.alert');
            alerts.forEach(alert => {
                alert.style.opacity = '0';
                setTimeout(() => alert.remove(), 500);
            });
        }, 3000);
    </script>
    <script>
        function confirmarLogout() {
            return confirm("Deseja sair da sua conta?");
        }
    </script>
 
</body>
 
</html>
