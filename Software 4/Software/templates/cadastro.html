<!DOCTYPE html>
<html lang="en">
 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='cadastro.css') }}">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>
 
<body>
    <div class="container d-flex align-items-center justify-content-center login-container">
        <div class="login-card text-start">
            <div class="card-cad text-start mb-4">
 
                <img src="{{ url_for('static', filename='imagem/logo.png') }}" alt="HypeX" class="logo">
 
                <h4 class="mb-3 text-white">Seja Bem Vindo!</h4>
                <p class="mb-4 text-white">Cadastre-se</p>
                <div class="mt-4 text-white" style="font-size: 13px">
 
                    <a href="#" class="text-white">Termos de Uso</a> | <a href="#" class="text-white">Política de
                        Privacidade<br></a>
                    © 2025 HYPE X - Sistema de Estoque.
 
                </div>
            </div>
            <form method="POST" action="/cadastro">
            <!--  <input type="hidden" name="empresa_id" value="{{ empresa_id }}">-->
                <div class="forms mb-2 text-start">
                    <label class="form-label text-gray">Nome Da Empresa</label>
                    <div class="input-group w-50">
                        <span class=" input-group-text bg-dark border-secondary">
                            <i class="bi bi-person text-white"></i>
                        </span>
                        <input type="text" class="form-control" name="nome" placeholder="Digite seu nome completo"
                            required>
                    </div>
                    <div class="mb-2 text-start">
                        <label class="form-label text-gray">Email</label>
                        <div class="input-group w-50">
                            <span class="input-group-text bg-dark border-secondary">
                                <i class="bi bi-envelope text-white"></i>
                            </span>
                            <input type="email" class="form-control" name="email" placeholder="Digite seu email"
                                required>
 
                        </div>
 
                        <div class="mb-2 text-start">
                            <label class="form-label text-gray">Telefone</label>
                            <div class="input-group w-50">
                                <span class=" input-group-text bg-dark border-secondary">
                                    <i class="bi bi-telephone text-white"></i>
                                </span>
                                <input type="tel" class="form-control" name="telefone" placeholder="Digite seu telefone"
                                    required>
                            </div>
 
 
                            <div class="mb-2 text-start">
                                <label class="form-label text-gray">CPF ou CNPJ</label>
                                <div class="input-group w-50">
                                    <span class=" input-group-text bg-dark border-secondary">
                                        <i class="bi bi-person-circle text-white"></i>
                                    </span>
                                    <input type="text" class="form-control" name="cnpj" placeholder="000.000.000-00"
                                        required>
                                </div>
 
                                <div class="mb-2 text-start">
                                    <label class="form-label text-gray">Senha</label>
                                    <div class="input-group w-50">
                                        <span class=" input-group-text bg-dark border-secondary">
                                            <i class="bi bi-lock text-white"></i>
                                        </span>
                                        <input type="password" class="form-control" name="senha"
                                            placeholder="Digite sua senha" required>
                                    </div>
                                </div>
                                <button class="btn-login btn-primary w-50 text-white mt-2"
                                    type="submit">Cadastrar</button>
            </form>
        </div>
    </div>
 
</body>
 
</html>
